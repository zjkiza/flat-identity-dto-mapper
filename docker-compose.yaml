services:

  php_flat_identity_dto_mapper:
        restart: on-failure
        build:
            context: .
            dockerfile: ./docker/php/Dockerfile
            args:
                SYSTEM_TIMEZONE:            ${SYSTEM_TIMEZONE:-UTC}
                PHP_XDEBUG_ENABLE:          ${PHP_XDEBUG_ENABLE:-0}
                PHP_XDEBUG_MODE:            ${PHP_XDEBUG_MODE:-debug}
                PHP_XDEBUG_REMOTE_PORT:     ${PHP_XDEBUG_REMOTE_PORT:-9000}
                PHP_XDEBUG_REMOTE_ADDRESS:  ${PHP_XDEBUG_REMOTE_ADDRESS:-host.docker.internal}
                PHP_XDEBUG_IDEKEY:          ${PHP_XDEBUG_IDEKEY:-PHPSTORM}
                OPCACHE_ENABLE:             ${OPCACHE_ENABLE:-1}
                OPCACHE_ENABLE_CLI:         ${OPCACHE_ENABLE_CLI:-1}
        extra_hosts:
            - host.docker.internal:host-gateway
        env_file:
            -   path: .env
                required: false

        environment:
          COMPOSER_ROOT_VERSION: dev-main

        container_name: php_flat_identity_dto_mapper
        hostname: php_flat_identity_dto_mapper
        volumes:
          - ./:/www
        working_dir: /www
        expose:
          - "9000"
        networks:
            - docker-core-php_flat_identity_dto_mapper

networks:
    docker-core-php_flat_identity_dto_mapper:
